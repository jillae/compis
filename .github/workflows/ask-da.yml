name: Ask DA

on:
  push:
    branches:
      - flow-da-clean

jobs:
  check-ask-da:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for [ask-da] in commit message
        id: check
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "📝 Raw commit message: '$COMMIT_MSG'"
          
          if [[ "$COMMIT_MSG" == *"[ask-da]"* ]]; then
            echo "found=true" >> $GITHUB_OUTPUT
            
            # Extract instruction - remove [ask-da] tag
            INSTRUCTION=$(echo "$COMMIT_MSG" | sed 's/\[ask-da\]//g' | xargs)
            echo "🎯 Extracted instruction: '$INSTRUCTION'"
            echo "msg=$INSTRUCTION" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Call DA-Agent Edge Function
        if: steps.check.outputs.found == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INSTRUCTION="${{ steps.check.outputs.msg }}"
          echo "🔍 Instruction to send: '$INSTRUCTION'"
          
          # Create payload with jq
          PAYLOAD=$(jq -n \
            --arg instruction "$INSTRUCTION" \
            --arg owner "${{ github.repository_owner }}" \
            --arg repo "${{ github.event.repository.name }}" \
            '{instruction: $instruction, repoOwner: $owner, repoName: $repo, branch: "flow-da-clean"}')
          
          echo "📦 Full payload:"
          echo "$PAYLOAD" | jq '.'
          
          # Call edge function and capture both body and status
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$SUPABASE_URL/functions/v1/da-agent" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          echo "📨 HTTP Status: $HTTP_CODE"
          echo "📨 Response body:"
          echo "$BODY" | jq '.' || echo "$BODY"
          
          if [[ "$HTTP_CODE" == "200" ]] && echo "$BODY" | grep -q "\"success\":true"; then
            echo "✅ DA-Agent completed successfully"
          else
            echo "❌ DA-Agent failed"
            exit 1
          fi
