name: Ask DA

on:
  push:
    branches:
      - flow-da-clean

jobs:
  check-ask-da:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for [ask-da] in commit message
        id: check
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Message: $COMMIT_MSG"
          if [[ "$COMMIT_MSG" == *"[ask-da]"* ]]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "msg=$COMMIT_MSG" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Send to DeepAgent
        if: steps.check.outputs.found == 'true'
        env:
          DEEPAGENT_API_KEY: ${{ secrets.DEEPAGENT_API_KEY }}
          DEEPAGENT_CONVERSATION_ID: ${{ secrets.DEEPAGENT_CONVERSATION_ID }}
        run: |
          echo "🤖 Sending to DA: ${{ steps.check.outputs.msg }}"
          
          # Extract instruction from commit message
          INSTRUCTION=$(echo "${{ steps.check.outputs.msg }}" | sed 's/\[ask-da\]//g' | xargs)
          
          echo "Instruction: $INSTRUCTION"
          echo "✅ Would send to DA conversation: $DEEPAGENT_CONVERSATION_ID"
