name: Ask DA

on:
  push:
    branches:
      - flow-da-clean

jobs:
  check-ask-da:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for [ask-da] in commit message
        id: check
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Message: $COMMIT_MSG"
          if [[ "$COMMIT_MSG" == *"[ask-da]"* ]]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "msg=$COMMIT_MSG" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Send to DeepAgent API
        if: steps.check.outputs.found == 'true'
        env:
          DEEPAGENT_API_KEY: ${{ secrets.DEEPAGENT_API_KEY }}
        run: |
          INSTRUCTION=$(echo "${{ steps.check.outputs.msg }}" | sed 's/\[ask-da\]//g' | xargs)
          
          curl -X POST https://apps.abacus.ai/v1/chatcompletions \
            -H "Authorization: Bearer $DEEPAGENT_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gpt-4o",
              "messages": [
                {
                  "role": "system",
                  "content": "Du är en expert mjukvaruarkitekt som granskar GitHub commits. Ge strukturerad teknisk analys på svenska."
                },
                {
                  "role": "user",
                  "content": "'"$INSTRUCTION"'"
                }
              ],
              "max_tokens": 1000,
              "temperature": 0.7
            }'
