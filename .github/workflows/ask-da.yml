name: Ask DA

on:
  push:
    branches:
      - flow-da-clean

jobs:
  check-ask-da:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for [ask-da] in commit message
        id: check
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Message: $COMMIT_MSG"
          if [[ "$COMMIT_MSG" == *"[ask-da]"* ]]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "msg=$COMMIT_MSG" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Call DA-Agent Edge Function
        if: steps.check.outputs.found == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INSTRUCTION=$(echo "${{ steps.check.outputs.msg }}" | sed 's/\[ask-da\]//g' | xargs)
          
          echo "🤖 Sending to DA-Agent: $INSTRUCTION"
          
          RESPONSE=$(curl -s -X POST "$SUPABASE_URL/functions/v1/da-agent" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"instruction\": \"$INSTRUCTION\",
              \"repoOwner\": \"${{ github.repository_owner }}\",
              \"repoName\": \"${{ github.event.repository.name }}\",
              \"branch\": \"flow-da-clean\"
            }")
          
          echo "Response: $RESPONSE"
          
          if echo "$RESPONSE" | grep -q "\"success\":true"; then
            echo "✅ DA-Agent completed successfully"
          else
            echo "❌ DA-Agent failed"
            exit 1
          fi
