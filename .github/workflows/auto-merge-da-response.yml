name: Auto-merge DA Response

on:
  push:
    branches:
      - flow-da-clean

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge-da:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[da-response]')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: ${{ github.event.head_commit.message }}
          branch: flow-da-clean
          base: main
          title: "🤖 DA-Response: Auto-merge from flow-da-clean"
          body: |
            ## 🤖 Automatisk DA-Agent Response
            
            **Commit:** ${{ github.event.head_commit.message }}
            **SHA:** ${{ github.sha }}
            **Author:** ${{ github.event.head_commit.author.name }}
            
            Denna PR skapades automatiskt av DA-Agent workflow.
            Den kommer att auto-mergas om alla checks passerar.
            
            ---
            🔍 Granska ändringarna innan merge om nödvändigt.
          labels: |
            da-response
            auto-merge

      - name: Wait for checks
        if: steps.create-pr.outputs.pull-request-number
        run: sleep 30

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} \
            --auto \
            --squash \
            --delete-branch \
            --repo ${{ github.repository }}

      - name: Comment on PR
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ steps.create-pr.outputs.pull-request-number }} \
            --body "✅ Auto-merge aktiverad. PR kommer att mergas automatiskt när alla checks passerar." \
            --repo ${{ github.repository }}
